# ============================================================================
# Deeplink Next - 面向下一代算力系统
# ============================================================================

site_name: Deeplink Next
site_description: >-
  Deeplink 面向下一代算力系统的开源演进 — 为 AI 原生、异构计算与分布式协同而设计的算力基础设施
site_author: Deeplink Community
site_url: https://deeplink-next.zensical.org/

copyright: Copyright &copy; 2026 Deeplink Community

repo_name: deeplink-org/deeplink-next
repo_url: https://github.com/deeplink-org/deeplink-next

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js
  - javascripts/landing-hero-bg.js

theme:
  name: material
  custom_dir: overrides
  language: zh
  icon:
    logo: material/memory
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - toc.follow
  palette:
    scheme: slate
    primary: indigo
    accent: orange

extra:
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  status:
    new: Recently added
    deprecated: Deprecated
  tags:
    default: default
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/deeplink-org
      name: GitHub

plugins:
  - search
  - tags
  - glightbox:
      auto_themed: true
  - blog:
      blog_dir: blog

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:zensical.extensions.emoji.to_svg
      emoji_index: !!python/name:zensical.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: deeplink-org
      repo: deeplink-next
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - 首页: index.md
  - 愿景与路线:
      - 整体路线图: overview/index.md
      - 愿景与目标: overview/vision.md
      - 路线图: overview/roadmap.md
  - 架构:
      - architecture/index.md
      - 核心组件: architecture/components.md
  - 概念:
      - concepts/index.md
      - 计算织网: concepts/compute-fabric.md
  - 快速开始:
      - getting-started/index.md
      - 安装部署: getting-started/installation.md
  - 社区:
      - community/index.md
      - 参与贡献: community/contributing.md
  - 博客: blog/index.md
