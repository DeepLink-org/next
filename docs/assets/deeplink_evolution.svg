<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <linearGradient id="fusedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="580" fill="#fafafa"/>

  <text x="600" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">超智融合演进路径</text>
  <text x="600" y="54" text-anchor="middle" font-size="13" fill="#6b7280">跨域软件互联 → 跨域硬件互联（内部架构仍分离） → DeepLink 新形态同集群合建</text>

  <!-- =========================================================== -->
  <!-- PANEL 1: DeepLink 软件 · 跨域智算 -->
  <!-- =========================================================== -->
  <g transform="translate(15, 80)">
    <rect width="290" height="440" rx="12" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
    <circle cx="32" cy="34" r="18" fill="#3b82f6"/>
    <text x="32" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">1</text>
    <text x="60" y="32" font-size="13" font-weight="700" fill="#111827">跨域智算 · 纯软件</text>
    <text x="60" y="50" font-size="10" fill="#6b7280">DeepLink 当下已落地</text>
    <g transform="translate(186, 14)">
      <rect width="92" height="22" rx="11" fill="#1e40af"/>
      <text x="46" y="15" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">DeepLink 独有</text>
    </g>

    <!-- Two AI centers -->
    <g transform="translate(15, 80)">
      <rect width="115" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="57.5" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">智算中心 A</text>
      <rect x="10" y="30" width="22" height="20" rx="3" fill="#3b82f6"/>
      <rect x="38" y="30" width="22" height="20" rx="3" fill="#60a5fa"/>
      <rect x="66" y="30" width="22" height="20" rx="3" fill="#3b82f6"/>
      <rect x="94" y="30" width="11" height="20" rx="3" fill="#60a5fa"/>
      <rect x="10" y="56" width="22" height="20" rx="3" fill="#60a5fa"/>
      <rect x="38" y="56" width="22" height="20" rx="3" fill="#3b82f6"/>
      <rect x="66" y="56" width="22" height="20" rx="3" fill="#60a5fa"/>
      <rect x="94" y="56" width="11" height="20" rx="3" fill="#3b82f6"/>
      <text x="57.5" y="93" text-anchor="middle" font-size="9" fill="#6b7280">异构国产芯片</text>
    </g>
    <g transform="translate(160, 80)">
      <rect width="115" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="57.5" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">智算中心 B</text>
      <rect x="10" y="30" width="22" height="20" rx="3" fill="#60a5fa"/>
      <rect x="38" y="30" width="22" height="20" rx="3" fill="#3b82f6"/>
      <rect x="66" y="30" width="22" height="20" rx="3" fill="#60a5fa"/>
      <rect x="94" y="30" width="11" height="20" rx="3" fill="#3b82f6"/>
      <rect x="10" y="56" width="22" height="20" rx="3" fill="#3b82f6"/>
      <rect x="38" y="56" width="22" height="20" rx="3" fill="#60a5fa"/>
      <rect x="66" y="56" width="22" height="20" rx="3" fill="#3b82f6"/>
      <rect x="94" y="56" width="11" height="20" rx="3" fill="#60a5fa"/>
      <text x="57.5" y="93" text-anchor="middle" font-size="9" fill="#6b7280">异构国产芯片</text>
    </g>
    <line x1="130" y1="130" x2="160" y2="130" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="6,4"/>
    <text x="145" y="120" text-anchor="middle" font-size="9" fill="#3b82f6">通用 RoCE</text>
    <text x="145" y="148" text-anchor="middle" font-size="8" fill="#9ca3af">无专用硬件</text>

    <!-- Software stack -->
    <g transform="translate(15, 215)">
      <rect width="260" height="92" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="130" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">DeepLink 软件栈（独有）</text>
      <g transform="translate(10, 32)">
        <rect width="78" height="50" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="0.8"/>
        <text x="39" y="20" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">任务智能</text>
        <text x="39" y="33" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">切片</text>
        <text x="39" y="46" text-anchor="middle" font-size="8" fill="#6b7280">拓扑感知</text>
      </g>
      <g transform="translate(92, 32)">
        <rect width="78" height="50" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="0.8"/>
        <text x="39" y="20" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">长距通信</text>
        <text x="39" y="33" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">库</text>
        <text x="39" y="46" text-anchor="middle" font-size="8" fill="#6b7280">拥塞控制</text>
      </g>
      <g transform="translate(174, 32)">
        <rect width="78" height="50" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="0.8"/>
        <text x="39" y="20" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">异构混训</text>
        <text x="39" y="33" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">框架</text>
        <text x="39" y="46" text-anchor="middle" font-size="8" fill="#6b7280">统一算子</text>
      </g>
    </g>

    <line x1="15" y1="335" x2="275" y2="335" stroke="#e5e7eb" stroke-width="1"/>
    <text x="145" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">万卡 · 千公里 · 3+ 国产芯片</text>
    <text x="145" y="375" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">MFU 80% · 有效训练 95%</text>
    <text x="145" y="402" text-anchor="middle" font-size="10" font-style="italic" fill="#9ca3af">“软件版 Scale Across”</text>
    <text x="145" y="420" text-anchor="middle" font-size="10" font-style="italic" fill="#9ca3af">不依赖专用硬件</text>
  </g>

  <!-- Arrow 1 -> 2 -->
  <g>
    <line x1="310" y1="290" x2="355" y2="290" stroke="#6b7280" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="332" y="280" text-anchor="middle" font-size="10" fill="#6b7280">+ 专用硬件</text>
  </g>

  <!-- =========================================================== -->
  <!-- PANEL 2: 跨域超智互联，内部架构仍不同 -->
  <!-- =========================================================== -->
  <g transform="translate(360, 80)">
    <rect width="410" height="440" rx="12" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
    <circle cx="32" cy="34" r="18" fill="#f97316"/>
    <text x="32" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">2</text>
    <text x="60" y="32" font-size="13" font-weight="700" fill="#111827">跨域超智互联 · 软硬协同</text>
    <text x="60" y="50" font-size="10" fill="#6b7280">DeepLink 跨域硬件：仅解决"互联"，未解决"合建"</text>
    <g transform="translate(308, 14)">
      <rect width="92" height="22" rx="11" fill="#9a3412"/>
      <text x="46" y="15" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">DeepLink 独有</text>
    </g>

    <!-- AI center with internal Full Mesh -->
    <g transform="translate(15, 78)">
      <rect width="135" height="160" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="67.5" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">智算中心</text>
      <text x="67.5" y="36" text-anchor="middle" font-size="9" fill="#6b7280">内部：Full Mesh</text>
      <g transform="translate(8, 45)" opacity="0.85">
        <g stroke="#3b82f6" stroke-width="0.8" fill="none" opacity="0.7">
          <line x1="60" y1="14" x2="100" y2="38"/>
          <line x1="60" y1="14" x2="86" y2="86"/>
          <line x1="60" y1="14" x2="34" y2="86"/>
          <line x1="60" y1="14" x2="20" y2="38"/>
          <line x1="100" y1="38" x2="86" y2="86"/>
          <line x1="100" y1="38" x2="34" y2="86"/>
          <line x1="100" y1="38" x2="20" y2="38"/>
          <line x1="86" y1="86" x2="34" y2="86"/>
          <line x1="86" y1="86" x2="20" y2="38"/>
          <line x1="34" y1="86" x2="20" y2="38"/>
        </g>
        <circle cx="60" cy="14" r="4" fill="#3b82f6"/>
        <circle cx="100" cy="38" r="4" fill="#3b82f6"/>
        <circle cx="86" cy="86" r="4" fill="#3b82f6"/>
        <circle cx="34" cy="86" r="4" fill="#3b82f6"/>
        <circle cx="20" cy="38" r="4" fill="#3b82f6"/>
      </g>
      <text x="67.5" y="153" text-anchor="middle" font-size="8" font-style="italic" fill="#1e40af">全对等 · 集合通信</text>
    </g>

    <!-- HPC center with internal 3D Torus -->
    <g transform="translate(260, 78)">
      <rect width="135" height="160" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
      <text x="67.5" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412">超算中心</text>
      <text x="67.5" y="36" text-anchor="middle" font-size="9" fill="#6b7280">内部：3D Torus</text>
      <g transform="translate(15, 50)" opacity="0.9">
        <line x1="20" y1="10" x2="90" y2="10" stroke="#f97316" stroke-width="1"/>
        <line x1="20" y1="38" x2="90" y2="38" stroke="#f97316" stroke-width="1"/>
        <line x1="20" y1="66" x2="90" y2="66" stroke="#f97316" stroke-width="1"/>
        <line x1="20" y1="10" x2="20" y2="66" stroke="#f97316" stroke-width="1"/>
        <line x1="55" y1="10" x2="55" y2="66" stroke="#f97316" stroke-width="1"/>
        <line x1="90" y1="10" x2="90" y2="66" stroke="#f97316" stroke-width="1"/>
        <path d="M 20 10 Q 6 38 20 66" stroke="#f97316" stroke-width="0.8" stroke-dasharray="2,2" fill="none"/>
        <path d="M 90 10 Q 104 38 90 66" stroke="#f97316" stroke-width="0.8" stroke-dasharray="2,2" fill="none"/>
        <path d="M 20 10 Q 55 -2 90 10" stroke="#f97316" stroke-width="0.8" stroke-dasharray="2,2" fill="none"/>
        <path d="M 20 66 Q 55 78 90 66" stroke="#f97316" stroke-width="0.8" stroke-dasharray="2,2" fill="none"/>
        <circle cx="20" cy="10" r="3" fill="#f97316"/>
        <circle cx="55" cy="10" r="3" fill="#f97316"/>
        <circle cx="90" cy="10" r="3" fill="#f97316"/>
        <circle cx="20" cy="38" r="3" fill="#f97316"/>
        <circle cx="55" cy="38" r="3" fill="#f97316"/>
        <circle cx="90" cy="38" r="3" fill="#f97316"/>
        <circle cx="20" cy="66" r="3" fill="#f97316"/>
        <circle cx="55" cy="66" r="3" fill="#f97316"/>
        <circle cx="90" cy="66" r="3" fill="#f97316"/>
      </g>
      <text x="67.5" y="153" text-anchor="middle" font-size="8" font-style="italic" fill="#9a3412">规整低维 · 邻近通信</text>
    </g>

    <!-- DeepLink cross-domain hardware in middle -->
    <g transform="translate(160, 130)">
      <rect width="90" height="58" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">DeepLink</text>
      <text x="45" y="32" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">跨域硬件</text>
      <text x="45" y="48" text-anchor="middle" font-size="8" fill="#92400e">距离感知·加速</text>
    </g>
    <line x1="150" y1="158" x2="160" y2="158" stroke="#f59e0b" stroke-width="2.2"/>
    <line x1="250" y1="158" x2="260" y2="158" stroke="#f59e0b" stroke-width="2.2"/>

    <!-- Key insight callout -->
    <g transform="translate(15, 258)">
      <rect width="380" height="64" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="190" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412">为什么超算和智算不一起建？</text>
      <text x="190" y="42" text-anchor="middle" font-size="10" fill="#9a3412">两者内部组网架构本来就不同·同集群难以同时高效承载</text>
      <text x="190" y="58" text-anchor="middle" font-size="9" fill="#6b7280">DeepLink 硬件只能解决“跨域互联”，未解决“合建”</text>
    </g>

    <!-- Software + Hardware stack -->
    <g transform="translate(15, 340)">
      <rect width="380" height="60" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
      <text x="190" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412">DeepLink 软硬一体栈（独有）</text>
      <g transform="translate(10, 28)">
        <rect width="116" height="24" rx="4" fill="#ffffff" stroke="#f97316" stroke-width="0.6"/>
        <text x="58" y="16" text-anchor="middle" font-size="9" fill="#9a3412">原软件栈 + 元调度</text>
      </g>
      <g transform="translate(132, 28)">
        <rect width="116" height="24" rx="4" fill="#ffffff" stroke="#f97316" stroke-width="0.6"/>
        <text x="58" y="16" text-anchor="middle" font-size="9" fill="#9a3412">跨域专用硬件</text>
      </g>
      <g transform="translate(254, 28)">
        <rect width="116" height="24" rx="4" fill="#ffffff" stroke="#f97316" stroke-width="0.6"/>
        <text x="58" y="16" text-anchor="middle" font-size="9" fill="#9a3412">统一数据湖</text>
      </g>
    </g>

    <text x="205" y="421" text-anchor="middle" font-size="10" font-style="italic" fill="#9ca3af">FP64 与 AI 跨域流转 · 但集群内部仍是两种世界</text>
  </g>

  <!-- Arrow 2 -> 3 -->
  <g>
    <line x1="775" y1="290" x2="820" y2="290" stroke="#6b7280" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="797" y="280" text-anchor="middle" font-size="10" fill="#6b7280">+ 新芯片·新架构</text>
  </g>

  <!-- =========================================================== -->
  <!-- PANEL 3: DeepLink 新形态 · 同集群合建 -->
  <!-- =========================================================== -->
  <g transform="translate(825, 80)">
    <rect width="360" height="440" rx="12" fill="#ffffff" stroke="url(#fusedGrad)" stroke-width="2.5"/>
    <circle cx="32" cy="34" r="18" fill="url(#fusedGrad)"/>
    <text x="32" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">3</text>
    <text x="60" y="32" font-size="13" font-weight="700" fill="#111827">DeepLink 新形态 · 同集群合建</text>
    <text x="60" y="50" font-size="10" fill="#6b7280">芯片 + 架构 同时融合</text>
    <g transform="translate(256, 14)">
      <rect width="92" height="22" rx="11" fill="#581c87"/>
      <text x="46" y="15" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">DeepLink 独有</text>
    </g>

    <!-- Single cluster boundary (contrast with two boxes in panel 2) -->
    <rect x="20" y="75" width="320" height="270" rx="14" fill="none" stroke="url(#fusedGrad)" stroke-width="1.8" stroke-dasharray="6,4"/>
    <g transform="translate(110, 68)">
      <rect width="140" height="18" rx="9" fill="#ffffff"/>
      <text x="70" y="13" text-anchor="middle" font-size="10" font-weight="700" fill="#581c87">超算 + 智算 同集群</text>
    </g>

    <!-- Fused chip (prominent) -->
    <g transform="translate(95, 95)">
      <rect width="170" height="100" rx="8" fill="url(#fusedGrad)" opacity="0.18"/>
      <rect width="170" height="100" rx="8" fill="none" stroke="url(#fusedGrad)" stroke-width="2"/>
      <text x="85" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#581c87">DeepLink 超智融合芯片</text>
      <rect x="14" y="32" width="68" height="26" rx="3" fill="#3b82f6" opacity="0.85"/>
      <rect x="88" y="32" width="68" height="26" rx="3" fill="#f97316" opacity="0.85"/>
      <rect x="14" y="62" width="68" height="26" rx="3" fill="#f97316" opacity="0.85"/>
      <rect x="88" y="62" width="68" height="26" rx="3" fill="#3b82f6" opacity="0.85"/>
      <text x="48" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">AI</text>
      <text x="122" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">FP64</text>
      <text x="48" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">FP64</text>
      <text x="122" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">AI</text>
    </g>

    <line x1="180" y1="195" x2="180" y2="210" stroke="url(#fusedGrad)" stroke-width="2"/>

    <!-- Reconfigurable topology -->
    <g transform="translate(40, 210)">
      <text x="140" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="#581c87">单一可重构组网</text>

      <g transform="translate(85, 24)">
        <g stroke="url(#fusedGrad)" stroke-width="1.5" fill="none" opacity="0.85">
          <line x1="105" y1="50" x2="84" y2="14"/>
          <line x1="84" y1="14" x2="42" y2="14"/>
          <line x1="42" y1="14" x2="21" y2="50"/>
          <line x1="21" y1="50" x2="42" y2="86"/>
          <line x1="42" y1="86" x2="84" y2="86"/>
          <line x1="84" y1="86" x2="105" y2="50"/>
        </g>
        <g stroke="#a855f7" stroke-width="1" stroke-dasharray="3,2" fill="none" opacity="0.7">
          <line x1="105" y1="50" x2="21" y2="50"/>
          <line x1="84" y1="14" x2="42" y2="86"/>
          <line x1="42" y1="14" x2="84" y2="86"/>
        </g>
        <circle cx="105" cy="50" r="5" fill="url(#fusedGrad)"/>
        <circle cx="84" cy="14" r="5" fill="url(#fusedGrad)"/>
        <circle cx="42" cy="14" r="5" fill="url(#fusedGrad)"/>
        <circle cx="21" cy="50" r="5" fill="url(#fusedGrad)"/>
        <circle cx="42" cy="86" r="5" fill="url(#fusedGrad)"/>
        <circle cx="84" cy="86" r="5" fill="url(#fusedGrad)"/>
      </g>

      <!-- Mode switch -->
      <g transform="translate(81, 130)">
        <rect width="120" height="28" rx="14" fill="#faf5ff" stroke="#a855f7" stroke-width="1.2"/>
        <circle cx="20" cy="14" r="9" fill="#3b82f6"/>
        <text x="20" y="18" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">AI</text>
        <text x="60" y="18" text-anchor="middle" font-size="11" fill="#6b21a8">⇄</text>
        <circle cx="100" cy="14" r="9" fill="#f97316"/>
        <text x="100" y="17" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">HPC</text>
      </g>
    </g>

    <line x1="20" y1="365" x2="340" y2="365" stroke="#e5e7eb" stroke-width="1"/>
    <text x="180" y="386" text-anchor="middle" font-size="11" font-weight="700" fill="#581c87">集群内部统一为可重构形态</text>
    <text x="180" y="403" text-anchor="middle" font-size="11" font-weight="700" fill="#581c87">Torus ⇄ Mesh 同一系统按需切换</text>
    <text x="180" y="425" text-anchor="middle" font-size="10" font-style="italic" fill="#9ca3af">“科学计算成为一种 AI 工作负载”</text>
  </g>

  <!-- Bottom timeline -->
  <line x1="40" y1="555" x2="1160" y2="555" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="160" y="572" text-anchor="middle" font-size="11" fill="#6b7280">当下 · 已落地</text>
  <text x="565" y="572" text-anchor="middle" font-size="11" fill="#6b7280">1–2 年</text>
  <text x="1005" y="572" text-anchor="middle" font-size="11" fill="#6b7280">2–3 年</text>
</svg>
